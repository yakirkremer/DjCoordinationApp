# Render Blueprint — Kramer Music DJ Coordination App
# Apply via: https://dashboard.render.com/blueprint/new?repo=<YOUR_GITHUB_REPO_URL>

services:
  - type: web
    name: kremer-music
    runtime: node
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: kremer-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_ROOT
        value: /var/data
      - key: VITE_DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_REFRESH_TOKEN
        sync: false

# Persistent disk layout (on Render):
#   /var/data/music/{category}/analyzed/*.mp3
#   /var/data/data/catalog.json, clients.json, feedback.json, form-schema.json
#
# If you already created a disk in the Render dashboard, set STORAGE_ROOT to match
# your disk mount path exactly (Dashboard → your service → Disks → Mount path).
