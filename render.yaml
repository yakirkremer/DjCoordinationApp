# Render Blueprint — Kramer Music DJ Coordination App
# Apply via: https://dashboard.render.com/blueprint/new?repo=<YOUR_GITHUB_REPO_URL>

services:
  - type: web
    name: kremer-music
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_REFRESH_TOKEN
        sync: false

# Optional: upgrade to starter + persistent disk so uploads and JSON data survive redeploys.
